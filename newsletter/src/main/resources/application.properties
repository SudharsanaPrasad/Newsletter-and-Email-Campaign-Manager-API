spring.application.name=newsletter

# the platform sets PORT in production; default to 8080 locally
server.port=${PORT:8080}

# datasource and secrets come from the environment so nothing sensitive is
# committed. The JDBC URL decides the database - a PostgreSQL URL in production
# (Render) or a MySQL URL locally; the driver is picked from the URL.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

springdoc.swagger-ui.path=/swagger-ui.html
